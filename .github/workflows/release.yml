name: Release and Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # vitest requires >=20; the published package still supports Node 18
          # at runtime (see "engines" in package.json), this is build/test only.
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          CI: true

      # Authenticates via OIDC against the trusted publisher configured on
      # npmjs.com for this package — no token, nothing to rotate.
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Install DXT tool
        run: npm install -g @anthropic-ai/dxt

      - name: Package Claude Desktop Extension
        run: dxt pack

      - name: Get package name
        id: package_name
        run: echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_name.outputs.name }}.dxt 